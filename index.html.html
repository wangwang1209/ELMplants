<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>植栽報價查詢系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{
  --bg:#f2efe8;--sf:#fff;--sf2:#faf8f3;
  --moss:#3d5c35;--moss2:#527048;--moss3:#c8d8be;
  --ink:#1a1a18;--ink2:#484844;--ink3:#888880;--ink4:#b8b5ae;
  --bd:#ddd8ce;--bd2:#e8e4db;
  --lo:#1a6a1a;--hi:#b83020;
  --red:#b83020;--red2:#fde8e4;
  --blue:#205090;--blue2:#deeaf8;
  --r:7px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}

/* Topbar */
.tb{background:var(--moss);height:48px;display:flex;align-items:center;padding:0 14px;gap:8px;position:sticky;top:0;z-index:400;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.tb h1{font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.04em;}
.ttabs{display:flex;gap:3px;margin-left:8px;}
.ttab{padding:4px 10px;border-radius:14px;border:none;font-family:inherit;font-size:.72rem;cursor:pointer;background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);}
.ttab.on{background:#fff;color:var(--moss);font-weight:600;}
.dbc{font-size:.65rem;color:rgba(255,255,255,.4);margin-left:auto;}

/* Pages */
.pg{display:none;}.pg.on{display:block;}

/* Search */
.hero{background:var(--moss);padding:8px 14px 12px;}
.sw{max-width:700px;position:relative;}
.sw input{width:100%;padding:9px 36px 9px 13px;border-radius:50px;border:none;font-family:inherit;font-size:.86rem;background:rgba(255,255,255,.95);color:var(--ink);outline:none;box-shadow:0 2px 10px rgba(0,0,0,.16);}
.sw input:focus{background:#fff;}
.sw input::placeholder{color:var(--ink4);}
.sc{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;cursor:pointer;color:var(--ink3);display:none;}

/* Year bar */
.ybar{background:var(--sf);border-bottom:2px solid var(--bd);padding:0 14px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:48px;z-index:300;scrollbar-width:none;}
.ybar::-webkit-scrollbar{display:none;}
.ybtn{padding:8px 11px;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;background:transparent;color:var(--ink3);white-space:nowrap;flex-shrink:0;}
.ybtn.on{color:var(--moss);border-color:var(--moss);}
.ybtn:hover:not(.on){color:var(--moss2);}
.yc{font-size:.6rem;font-weight:400;opacity:.65;margin-left:2px;}

/* Filter */
.frow{background:var(--sf);border-bottom:1px solid var(--bd);padding:5px 14px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;position:sticky;top:96px;z-index:200;}
.fl{font-size:.62rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;margin-right:1px;}
.chip{padding:2px 8px;border-radius:12px;border:1.5px solid var(--bd);font-size:.69rem;font-family:inherit;cursor:pointer;background:var(--sf2);color:var(--ink2);user-select:none;white-space:nowrap;}
.chip.on{background:var(--moss);color:#fff;border-color:var(--moss);}

/* Sort/Stats */
.srow{padding:4px 14px;display:flex;gap:3px;align-items:center;background:var(--sf2);border-bottom:1px solid var(--bd2);flex-wrap:wrap;}
.sl{font-size:.62rem;color:var(--ink3);margin-right:1px;}
.sb{padding:2px 7px;border-radius:4px;border:1px solid var(--bd);font-size:.67rem;font-family:inherit;cursor:pointer;background:transparent;color:var(--ink2);}
.sb.on{background:var(--moss3);border-color:var(--moss2);color:var(--moss);font-weight:600;}
.strow{padding:3px 14px;font-size:.67rem;color:var(--ink3);border-bottom:1px solid var(--bd2);background:var(--sf2);display:flex;gap:8px;}
.strow strong{color:var(--moss);}

/* Table */
.tw{overflow-x:auto;padding:10px 14px 40px;}
table{width:100%;border-collapse:collapse;background:var(--sf);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);min-width:560px;}
thead{background:var(--moss);}
thead th{padding:7px 8px;text-align:left;font-size:.65rem;color:rgba(255,255,255,.9);font-weight:500;white-space:nowrap;}
th.c{text-align:center;}th.r{text-align:right;}
tbody tr{border-bottom:1px solid var(--bd2);cursor:pointer;}
tbody tr:hover{background:#eef6ee;}
td{padding:6px 8px;font-size:.79rem;vertical-align:middle;}
td.c{text-align:center;}td.r{text-align:right;font-variant-numeric:tabular-nums;}
.nm{font-weight:600;}
.plo{color:var(--lo);font-weight:700;}
.phi{color:var(--hi);font-weight:700;}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.ct{background:#c8a060;}.cs{background:#60a880;}
.uc{font-size:.67rem;color:var(--ink3);max-width:140px;}
.er td{text-align:center;padding:36px;color:var(--ink3);}

/* Add page */
.ap{padding:14px;max-width:600px;}
.ap h2{font-size:.93rem;font-weight:700;margin-bottom:10px;color:var(--moss);}
.fc{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:13px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.fs{font-size:.61rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--bd2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:7px;}
.fd label{display:block;font-size:.64rem;color:var(--ink3);margin-bottom:2px;}
.fd label span{color:var(--red);}
.fd input,.fd textarea{width:100%;padding:6px 7px;border:1.5px solid var(--bd);border-radius:5px;font-family:inherit;font-size:.79rem;color:var(--ink);background:#fff;outline:none;}
.fd input:focus,.fd textarea:focus{border-color:var(--moss);}
.fd textarea{resize:vertical;min-height:46px;}
.csel{display:flex;gap:6px;margin-bottom:7px;}
.co{flex:1;padding:7px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;text-align:center;font-size:.75rem;font-weight:500;user-select:none;}
.co.ot{background:#f5ecd8;border-color:#5a3a1a;color:#5a3a1a;}
.co.os{background:#d8f0e4;border-color:#1a4835;color:#1a4835;}
.btn{padding:7px 14px;border-radius:6px;font-family:inherit;font-size:.79rem;cursor:pointer;border:none;font-weight:500;}
.btnp{background:var(--moss);color:#fff;}
.btng{background:transparent;border:1.5px solid var(--bd);color:var(--ink2);}
.btnr{background:var(--red);color:#fff;}
.brow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto;}
.mbg.show{display:flex;}
.mo{background:var(--sf);border-radius:10px;padding:18px;width:min(560px,95vw);box-shadow:0 6px 32px rgba(0,0,0,.26);margin-bottom:30px;}
.mo h3{font-size:.9rem;font-weight:700;margin-bottom:11px;color:var(--moss);}
.mbt{display:flex;gap:6px;justify-content:flex-end;margin-top:11px;flex-wrap:wrap;}
.mbt-l{margin-right:auto;}

#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:7px 16px;border-radius:18px;font-size:.77rem;opacity:0;transition:all .22s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:540px){
  .topbar,.hero,.ybar,.frow,.srow,.strow,.tw,.ap{padding-left:10px;padding-right:10px;}
  .dbc,.hm{display:none;}
  .g4{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="tb">
  <h1>🌿 植栽報價查詢</h1>
  <div class="ttabs">
    <button class="ttab on" onclick="showTab('search')">查詢</button>
    <button class="ttab" onclick="showTab('add')">＋ 新增</button>
  </div>
  <span class="dbc" id="dbc"></span>
</div>

<div class="pg on" id="pg-search">
  <div class="hero">
    <div class="sw">
      <input id="q" type="text" placeholder="品名或規格，例如：流蘇  6吋  H200  球型" autocomplete="off">
      <button class="sc" id="qc" onclick="clearQ()">×</button>
    </div>
  </div>

  <div class="ybar">
    <button class="ybtn on" data-yr="all">全部<span class="yc" id="yc-all"></span></button>
    <button class="ybtn" data-yr="107">107年<span class="yc" id="yc-107"></span></button>
    <button class="ybtn" data-yr="108">108年<span class="yc" id="yc-108"></span></button>
    <button class="ybtn" data-yr="109">109年<span class="yc" id="yc-109"></span></button>
    <button class="ybtn" data-yr="110">110年<span class="yc" id="yc-110"></span></button>
    <button class="ybtn" data-yr="111">111年<span class="yc" id="yc-111"></span></button>
    <button class="ybtn" data-yr="113">113年<span class="yc" id="yc-113"></span></button>
    <button class="ybtn" data-yr="114">114年<span class="yc" id="yc-114"></span></button>
    <button class="ybtn" data-yr="球型">球型<span class="yc" id="yc-球型"></span></button>
  </div>

  <div class="frow">
    <span class="fl">類型</span>
    <button class="chip on" data-ct="all">全部</button>
    <button class="chip" data-ct="tree">🌳 喬木</button>
    <button class="chip" data-ct="shrub">🌿 灌木</button>
    <span class="fl" style="margin-left:6px">規格</span>
    <button class="chip on" data-sp="all">全部</button>
    <button class="chip" data-sp="i">吋</button>
    <button class="chip" data-sp="H">H高度</button>
    <button class="chip" data-sp="D">D樹徑</button>
    <button class="chip" data-sp="W">W寬度</button>
  </div>

  <div class="srow">
    <span class="sl">排序</span>
    <button class="sb on" data-so="name">品名</button>
    <button class="sb" data-so="lo_a">低價↑</button>
    <button class="sb" data-so="lo_d">低價↓</button>
    <button class="sb" data-so="hi_d">高價↓</button>
    <button class="sb" data-so="H_d">樹高↓</button>
  </div>
  <div class="strow">
    <span id="stxt">載入中…</span>
    <span id="spx"></span>
    <span style="margin-left:auto;font-size:.62rem;color:var(--ink4)">點列可編輯</span>
  </div>

  <div class="tw">
    <table>
      <thead><tr>
        <th>品名</th>
        <th class="c hm">D</th>
        <th class="c hm">L</th>
        <th class="c">H</th>
        <th class="c hm">W</th>
        <th class="c">吋</th>
        <th class="c hm">㎡</th>
        <th class="c hm">坪</th>
        <th class="c hm">盤</th>
        <th class="r">最低價</th>
        <th class="r">最高價</th>
        <th class="hm">年份</th>
        <th class="hm">備註</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<div class="pg" id="pg-add">
  <div class="ap">
    <h2>＋ 新增品項</h2>
    <div class="fc">
      <div class="fs">基本資料</div>
      <div class="g2">
        <div class="fd"><label>品名 <span>*</span></label><input id="fn" type="text" placeholder="例：流蘇"></div>
        <div class="fd"><label>年份／來源 <span>*</span></label><input id="fy" type="text" placeholder="例：114"></div>
      </div>
      <div class="fs" style="margin-top:5px">類型</div>
      <div class="csel">
        <div class="co ot" id="ot" onclick="selCat('tree')">🌳 喬木</div>
        <div class="co" id="os" onclick="selCat('shrub')">🌿 灌木／草花</div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">規格</div>
      <div class="g4">
        <div class="fd"><label>D 樹徑</label><input id="fD" type="text" placeholder="10-12"></div>
        <div class="fd"><label>L 長度</label><input id="fL" type="text" placeholder="8尺"></div>
        <div class="fd"><label>H 高度cm</label><input id="fH" type="text" placeholder="200-220"></div>
        <div class="fd"><label>W 寬度cm</label><input id="fW" type="text" placeholder="150"></div>
      </div>
      <div class="g4">
        <div class="fd"><label>吋（盆）</label><input id="fi" type="text" placeholder='6"'></div>
        <div class="fd"><label>㎡</label><input id="fm" type="text"></div>
        <div class="fd"><label>坪</label><input id="fp" type="text"></div>
        <div class="fd"><label>盤</label><input id="fb" type="text"></div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">價格</div>
      <div class="g2">
        <div class="fd"><label>最低價（元）<span>*</span></label><input id="flo" type="number" min="0" placeholder="60"></div>
        <div class="fd"><label>最高價（元）</label><input id="fhi" type="number" min="0" placeholder="留空同最低價"></div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">備註</div>
      <div class="fd"><textarea id="fnote" placeholder="案場名稱（可不填）"></textarea></div>
    </div>
    <div class="brow">
      <button class="btn btnp" onclick="doAdd()">儲存新增</button>
      <button class="btn btng" onclick="clrForm()">清除</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="mbg" id="em" onclick="bgClose(event)">
  <div class="mo">
    <h3 id="mo-ttl">✏️ 編輯品項</h3>
    <input type="hidden" id="ei"><input type="hidden" id="ec">
    <div class="fc">
      <div class="fs">基本資料</div>
      <div class="g2">
        <div class="fd"><label>品名</label><input id="en" type="text"></div>
        <div class="fd"><label>年份／來源</label><input id="ey" type="text"></div>
      </div>
      <div class="csel" style="margin-top:6px">
        <div class="co" id="eot" onclick="edCat('tree')">🌳 喬木</div>
        <div class="co" id="eos" onclick="edCat('shrub')">🌿 灌木</div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">規格</div>
      <div class="g4">
        <div class="fd"><label>D</label><input id="eD" type="text"></div>
        <div class="fd"><label>L</label><input id="eL" type="text"></div>
        <div class="fd"><label>H</label><input id="eH" type="text"></div>
        <div class="fd"><label>W</label><input id="eW" type="text"></div>
      </div>
      <div class="g4">
        <div class="fd"><label>吋</label><input id="ei2" type="text"></div>
        <div class="fd"><label>㎡</label><input id="em2" type="text"></div>
        <div class="fd"><label>坪</label><input id="ep2" type="text"></div>
        <div class="fd"><label>盤</label><input id="eb2" type="text"></div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">價格</div>
      <div class="g2">
        <div class="fd"><label>最低價</label><input id="elo" type="number"></div>
        <div class="fd"><label>最高價</label><input id="ehi" type="number"></div>
      </div>
    </div>
    <div class="fc">
      <div class="fs">備註</div>
      <div class="fd"><textarea id="enote"></textarea></div>
    </div>
    <div class="mbt">
      <button class="btn btnr mbt-l" onclick="delItem()">🗑 刪除</button>
      <button class="btn btng" onclick="closeMo()">取消</button>
      <button class="btn btnp" onclick="saveEd()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

function lE(){try{return JSON.parse(localStorage.getItem('pe')||'{}')}catch{return{}}}

function lA(){try{return JSON.parse(localStorage.getItem('pa')||'[]')}catch{return[]}}
function sA(a){try{localStorage.setItem('pa',JSON.stringify(a))}catch{}}

function allDB(){
  const e=lE(),a=lA();
  const base=BASE.filter(r=>e[r.id]!==null).map(r=>e[r.id]?{...r,...e[r.id]}:r);
  return[...base,...a];
}

function fuzzy(q,t){
  q=q.toLowerCase();t=t.toLowerCase();
  if(t.includes(q))return true;
  let i=0;for(const c of t){if(c===q[i])i++;if(i===q.length)return true;}
  return false;
}
function hNum(s){const m=String(s||'').match(/(\d+)/);return m?+m[1]:0;}

function filtered(){
  let it=allDB();
  if(YR!=='all')it=it.filter(r=>(r.y||[]).includes(YR));
  if(CT==='tree')it=it.filter(r=>r.cat==='tree');
  else if(CT==='shrub')it=it.filter(r=>r.cat==='shrub');
  if(SP==='i')it=it.filter(r=>r.i);
  else if(SP==='H')it=it.filter(r=>r.H);
  else if(SP==='D')it=it.filter(r=>r.D);
  else if(SP==='W')it=it.filter(r=>r.W);
  if(Q){const ql=Q.toLowerCase();it=it.filter(r=>fuzzy(ql,r.n+(r.H||'')+(r.i||'')+(r.D||'')+(r.u||[]).join(' ')));}
  it=[...it];
  if(SO==='name')it.sort((a,b)=>a.n.localeCompare(b.n,'zh-TW'));
  else if(SO==='lo_a')it.sort((a,b)=>a.lo-b.lo);
  else if(SO==='lo_d')it.sort((a,b)=>b.lo-a.lo);
  else if(SO==='hi_d')it.sort((a,b)=>b.hi-a.hi);
  else if(SO==='H_d')it.sort((a,b)=>hNum(b.H)-hNum(a.H));
  return it;
}

const YC={'107':'#e8f0e0;#3a5a20','108':'#deeaf8;#204060','109':'#f0e8e0;#603020','110':'#e8e0f0;#402060','111':'#f4f4e0;#505020','113':'#ffe8d0;#804010','114':'#ffe0e0;#802020','球型':'#fff3d0;#7a5010'};
function yBadge(y){const p=YC[y]||'#e8e4db;#888';const[bg,c]=p.split(';');return`<span style="display:inline-block;padding:1px 5px;border-radius:4px;font-size:.59rem;background:${bg};color:${c}">${y}</span>`;}

function mkRow(r){
  const srcs=(r.y||[]).map(yBadge).join('');
  const us=(r.u||[]).join('、');
  const dot=r.cat==='tree'?'<span class="cdot ct"></span>':'<span class="cdot cs"></span>';
  return`<tr onclick="openEd(${r.id})">
    <td class="nm">${dot}${r.n}</td>
    <td class="c hm">${r.D||'—'}</td>
    <td class="c hm">${r.L||'—'}</td>
    <td class="c">${r.H||'—'}</td>
    <td class="c hm">${r.W||'—'}</td>
    <td class="c">${r.i||'—'}</td>
    <td class="c hm">${r.m||'—'}</td>
    <td class="c hm">${r.p||'—'}</td>
    <td class="c hm">${r.b||'—'}</td>
    <td class="r plo">$${r.lo.toLocaleString()}</td>
    <td class="r phi">$${r.hi.toLocaleString()}</td>
    <td class="hm" style="white-space:nowrap">${srcs}</td>
    <td class="uc hm">${us||'—'}</td>
  </tr>`;
}

function draw(it){document.getElementById('tb').innerHTML=it.slice(0,(pg+1)*PG).map(mkRow).join('');}

function render(){
  const it=filtered();
  document.getElementById('stxt').innerHTML=it.length?`共 <strong>${it.length}</strong> 筆`:'無符合條件的紀錄';
  if(it.length&&Q){
    const ps=it.flatMap(r=>[r.lo,r.hi]).filter(p=>p>0);
    if(ps.length)document.getElementById('spx').innerHTML=`$${Math.min(...ps).toLocaleString()}–$${Math.max(...ps).toLocaleString()}`;
    else document.getElementById('spx').textContent='';
  }else document.getElementById('spx').textContent='';
  const tb=document.getElementById('tb');
  if(!it.length){tb.innerHTML='<tr class="er"><td colspan="13">🍃 找不到</td></tr>';return;}
  draw(it);
}

// Add
function selCat(c){addCat=c;document.getElementById('ot').className='co'+(c==='tree'?' ot':'');document.getElementById('os').className='co'+(c==='shrub'?' os':'');}
function clrForm(){['fn','fy','fD','fL','fH','fW','fi','fm','fp','fb','flo','fhi','fnote'].forEach(id=>document.getElementById(id).value='');selCat('tree');}
function v(id){return document.getElementById(id).value.trim();}
function mkSpec(pre){
  const p=[];
  if(v(pre+'D'))p.push('D'+v(pre+'D'));if(v(pre+'L'))p.push('L'+v(pre+'L'));
  if(v(pre+'H'))p.push('H'+v(pre+'H'));if(v(pre+'W'))p.push('W'+v(pre+'W'));
  if(v(pre+'i')||v(pre+'i2'))p.push(v(pre+'i')||v(pre+'i2'));
  if(v(pre+'m')||v(pre+'m2'))p.push((v(pre+'m')||v(pre+'m2'))+'㎡');
  if(v(pre+'p')||v(pre+'p2'))p.push((v(pre+'p')||v(pre+'p2'))+'坪');
  if(v(pre+'b')||v(pre+'b2'))p.push((v(pre+'b')||v(pre+'b2'))+'盤');
  return p.join(' ');
}
function doAdd(){
  const n=v('fn'),yr=v('fy');const lo=parseFloat(document.getElementById('flo').value)||0;
  if(!n){toast('請填品名');return;}if(!yr){toast('請填年份');return;}if(!lo){toast('請填最低價');return;}
  const hi_r=parseFloat(document.getElementById('fhi').value);const hi=hi_r>lo?hi_r:lo;
  const spec=mkSpec('f');
  const nr={id:NID++,n,cat:addCat,lo,hi,y:[yr],
    D:v('fD'),L:v('fL'),H:v('fH'),W:v('fW'),i:v('fi'),m:v('fm'),p:v('fp'),b:v('fb'),
    u:v('fnote')?v('fnote').split(/[、,，\n]+/).map(x=>x.trim()).filter(Boolean):[],
    _a:true};
  if(spec)nr.s=spec;
  const a=lA();a.push(nr);sA(a);clrForm();render();updCounts();toast('✓ 新增：'+n);showTab('search');
}

  document.getElementById('eH').value=r.H||'';document.getElementById('eW').value=r.W||'';
  document.getElementById('ei2').value=r.i||'';document.getElementById('em2').value=r.m||'';
  document.getElementById('ep2').value=r.p||'';document.getElementById('eb2').value=r.b||'';

  edCat(r.cat||'shrub');
  document.getElementById('em').classList.add('show');
}
function edCat(c){document.getElementById('ec').value=c;document.getElementById('eot').className='co'+(c==='tree'?' ot':'');document.getElementById('eos').className='co'+(c==='shrub'?' os':'');}
function closeMo(){document.getElementById('em').classList.remove('show');editId=null;}
function bgClose(e){if(e.target===document.getElementById('em'))closeMo();}
function saveEd(){
  const id=+document.getElementById('ei').value;
  const cat=document.getElementById('ec').value||'shrub';
  const lo=parseFloat(document.getElementById('elo').value)||0;
  const hi_r=parseFloat(document.getElementById('ehi').value);const hi=hi_r>lo?hi_r:lo;
  const D=v('eD'),L=v('eL'),H=v('eH'),W=v('eW'),iv=v('ei2'),m=v('em2'),p=v('ep2'),b=v('eb2');
  const parts=[];
  if(D)parts.push('D'+D);if(L)parts.push('L'+L);if(H)parts.push('H'+H);if(W)parts.push('W'+W);
  if(iv)parts.push(iv);if(m)parts.push(m+'㎡');if(p)parts.push(p+'坪');if(b)parts.push(b+'盤');
  const upd={n:v('en'),y:v('ey').split(/[、,，]+/).map(x=>x.trim()).filter(Boolean),
    D,L,H,W,i:iv,m,p,b,s:parts.join(' '),lo,hi,cat,
    u:v('enote')?v('enote').split(/[、,，\n]+/).map(x=>x.trim()).filter(Boolean):[]};
  const added=lA();const ai=added.findIndex(x=>x.id===id);
  if(ai>=0){added[ai]={...added[ai],...upd};sA(added);}
  else{const e=lE();e[id]=upd;sE(e);}
  closeMo();render();updCounts();toast('✓ 已儲存');
}
function delItem(){
  if(!confirm('確定刪除？'))return;
  const id=+document.getElementById('ei').value;
  const added=lA();const ai=added.findIndex(x=>x.id===id);
  if(ai>=0){added.splice(ai,1);sA(added);}
  else{const e=lE();e[id]=null;sE(e);}
  closeMo();render();updCounts();toast('已刪除');
}

let tT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2000);}

updCounts();render();
</script>
